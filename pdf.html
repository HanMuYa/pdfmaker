<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基于纯单文件架构的公文矢量 PDF 导出系统</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfmake-fonts-google@1.0.2/dist/NotoSansSC.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F8FAFC;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 45px;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 90%;
        }
        h2 { color: #0F172A; margin-bottom: 12px; font-size: 22px; font-weight: 700; }
        p { color: #64748B; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .btn-gov {
            background-color: #A61E22; /* 国标公文红 */
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(166, 30, 34, 0.3);
            transition: all 0.2s;
        }
        .btn-gov:hover { background-color: #851417; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="container">
        <h2>单文件无依赖 PDF 导出系统</h2>
        <p>已彻底修复 offsets 报错问题。本页面引入了通过 CDN 托管的完整开源思源黑体（Noto Sans SC）虚拟文件层，支持直接双击运行或部署到 GitHub Pages，生成的高清公文文字可复制。</p>
        <button class="btn-gov" onclick="generatePureVectorPDF()">生成并下载标准公文 PDF</button>
    </div>

    <script>
        // =========================================================================
        // 【核心配置】绑定已经由扩展库注入到虚拟文件系统（pdfMake.vfs）中的思源黑体文件
        // =========================================================================
        pdfMake.fonts = {
            NotoSansSC: {
                normal: 'NotoSansSC-Regular.ttf',
                bold: 'NotoSansSC-Regular.ttf',
                italics: 'NotoSansSC-Regular.ttf',
                bolditalics: 'NotoSansSC-Regular.ttf'
            }
        };

        // 绝不报错的标准微型 PNG 占位图
        const base64ChartImage = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';

        function generatePureVectorPDF() {
            const docDefinition = {
                pageSize: 'A4',
                // 国标版心边距
                pageMargins: [79, 105, 74, 99], 

                defaultStyle: {
                    font: 'NotoSansSC', // 必须切换为咱们自己注入的非乱码中文真字体 Key
                    fontSize: 16,   
                    lineHeight: 1.5 
                },

                content: [
                    // 报告大标题
                    { 
                        text: '关于新高考改革下生源演变与\n录取率的多维度调研报告', 
                        style: 'govMainTitle' 
                    },
                    
                    // 一级标题一
                    { text: '一、 调研背景与概述', style: 'govH1' },
                    { 
                        text: '随着新高考改革在全国范围内的纵深推进，“分类考试、综合评价、多元录取”的格局已基本确立。2026年，全国高考报名人数再创新高，各省份生源结构、志愿填报模式以及高校录取率呈现出全新的地缘特征。', 
                        style: 'govParagraph' 
                    },
                    { 
                        text: '为全面掌握新高考背景下人才选拔与地方教育资源配置的实际状况，课题组历时数月，对全国核心省份的生源演变、录取率剪刀差及特殊类型招生名额调剂进行了多维度专项调研，形成了本项内部参考报告。', 
                        style: 'govParagraph' 
                    },

                    { text: '二、 核心省份生源梯队与数量分布', style: 'govH1' },
                    { 
                        text: '调研数据表明，我国各省份高考报名基数呈现出极强的阶梯性与地缘聚集特征。传统高考大省在宏观盘面中依然占据绝对权重，给当地的高等教育资源配给带来了持续性压力。', 
                        style: 'govParagraph' 
                    },

                    // 渲染插图
                    {
                        image: base64ChartImage,
                        width: 440,   
                        height: 120,  
                        alignment: 'center',
                        margin: [0, 15, 0, 5]
                    },
                    { 
                        text: '图 1：2026年核心省份高考报名基数梯队分布图 (单位：人次)', 
                        style: 'govImgCaption',
                        pageBreak: 'after' 
                    },

                    // ================= 第二页内容 =================
                    { 
                        text: '从上图可以直观看出，以河南、山东、广东为代表的传统人口大省，其考生基数在全局数量占比中居高不下，形成了显著的第一生源梯队。这种极高的生源密度，直接拉高了地缘内的竞争烈度。', 
                        style: 'govParagraph' 
                    },
                    
                    { text: '三、 录取率剪刀差与地缘分配矩阵', style: 'govH1' },
                    { 
                        text: '在生源基数持续扩张的背景下，各省份的实际业务量（计划投放数）与全局数量占比之间存在一定的动态调整。下表呈现了部分核心省份及地缘分支在本次调研中的具体表现：', 
                        style: 'govParagraph' 
                    },

                    // 数据热力表格矩阵
                    {
                        style: 'govTableStyle',
                        table: {
                            headersRows: 1,
                            widths: ['12%', '33%', '25%', '30%'],
                            body: [
                                [
                                    { text: '编号', style: 'tableHeader' },
                                    { text: '匹配省份 / 地缘分支说明', style: 'tableHeader' },
                                    { text: '实际业务量\n(考生频次)', style: 'tableHeader' },
                                    { text: '全局数量占比与状态解释', style: 'tableHeader' }
                                ],
                                [
                                    { text: 'NO.1', style: 'tableCellBold' },
                                    { text: '河南生源核心区', style: 'tableCellBold', alignment: 'left' },
                                    { text: '1,310,000 个', style: 'tableCell', fillColor: 'rgba(43, 108, 176, 0.6)', color: 'white' },
                                    { text: '11.2%\n(基数极高，面临结构性倒挂)', style: 'tableCell', fillColor: 'rgba(43, 108, 176, 0.6)', color: 'white' }
                                ],
                                [
                                    { text: 'NO.2', style: 'tableCellBold' },
                                    { text: '山东战略合作区', style: 'tableCellBold', alignment: 'left' },
                                    { text: '980,000 个', style: 'tableCell', fillColor: 'rgba(43, 108, 176, 0.3)' },
                                    { text: '8.4%\n(志愿滑档率显著下降)', style: 'tableCell', fillColor: 'rgba(43, 108, 176, 0.3)' }
                                ],
                                [
                                    { text: 'NO.3', style: 'tableCellBold' },
                                    { text: '广东生源密集区', style: 'tableCellBold', alignment: 'left' },
                                    { text: '860,000 个', style: 'tableCell', fillColor: 'rgba(43, 108, 176, 0.3)' },
                                    { text: '7.3%\n(省内高校扩招吸纳力强)', style: 'tableCell', fillColor: 'rgba(43, 108, 176, 0.3)' }
                                ],
                                [
                                    { text: 'NO.6', style: 'tableCellBold' },
                                    { text: '部分特殊边缘地缘独立招生...', style: 'tableCellBold', alignment: 'left' },
                                    { text: '-4,500 个', style: 'tableCellAlert' },
                                    { text: '账面呈核减状态，不计入正向分配\n(属计划名额调剂与资格复核)', style: 'tableCellAlert' }
                                ]
                            ]
                        },
                        layout: {
                            hLineWidth: () => 1,
                            vLineWidth: () => 1,
                            hLineColor: () => '#B0B0B0',
                            vLineColor: () => '#B0B0B0'
                        }
                    },

                    { text: '四、 核心问题研判与对策建议', style: 'govH1' },
                    { text: '（一） 跨省户籍合规性审查机制需进一步常态化', style: 'govH2' },
                    { 
                        text: '针对NO.6等边远地区的特殊情况，地方教育行政部门应建立跨部门数据共享机制，在报名阶段即对户籍、学籍实施穿透式审查。', 
                        style: 'govParagraph' 
                    }
                ],

                styles: {
                    govMainTitle: { fontSize: 28, bold: true, alignment: 'center', lineHeight: 1.4, margin: [0, 10, 0, 35] },
                    govH1: { fontSize: 16, bold: true, margin: [0, 20, 0, 10] },
                    govH2: { fontSize: 16, bold: true, margin: [0, 15, 0, 8] },
                    govParagraph: { fontSize: 15, lineHeight: 1.6, leadingIndent: 30, alignment: 'justify', margin: [0, 0, 0, 12] },
                    govImgCaption: { fontSize: 11, color: '#4A5568', alignment: 'center', margin: [0, 5, 0, 15] },
                    govTableStyle: { margin: [0, 15, 0, 20] },
                    tableHeader: { fontSize: 11, bold: true, fillColor: '#2C3E50', color: 'white', alignment: 'center', margin: [0, 6, 0, 6] },
                    tableCell: { fontSize: 10, alignment: 'center', margin: [0, 8, 0, 8] },
                    tableCellBold: { fontSize: 10, bold: true, alignment: 'center', margin: [0, 8, 0, 8] },
                    tableCellAlert: { fontSize: 10, bold: true, fillColor: '#FFF5F5', color: '#C53030', alignment: 'center', margin: [0, 6, 0, 6] }
                }
            };

            // 导出 PDF 矢量文件
            pdfMake.createPdf(docDefinition).download('关于新高考改革下生源演变与录取率的调研报告.pdf');
        }
    </script>
</body>
</html>
